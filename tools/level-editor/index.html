<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🗺️ Revenant Level Editor</title>
<style>
  :root{
    --bg:#1e1e2e; --mantle:#181825; --crust:#11111b; --surface:#313244; --surface2:#45475a;
    --text:#cdd6f4; --sub:#a6adc8; --blue:#89b4fa; --green:#a6e3a1; --yellow:#f9e2af;
    --peach:#fab387; --mauve:#cba6f7; --red:#f38ba8; --teal:#94e2d5; --pink:#f5c2e7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:13px/1.5 ui-monospace,'JetBrains Mono',Menlo,monospace;background:var(--bg);color:var(--text);overflow:hidden}
  header{padding:8px 14px;background:var(--crust);border-bottom:1px solid var(--surface);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{margin:0;font-size:15px;white-space:nowrap}
  header select,header input{background:var(--surface);color:var(--text);border:1px solid var(--surface2);border-radius:6px;padding:4px 7px;font:inherit}
  header input[type=number]{width:62px}
  .medals{color:var(--sub);font-size:12px;display:flex;align-items:center;gap:4px}
  .medals input{width:58px}
  .spacer{flex:1}
  button{background:var(--surface);color:var(--text);border:1px solid var(--surface2);border-radius:6px;padding:5px 11px;font:inherit;cursor:pointer}
  button:hover{background:var(--surface2)}
  button.primary{background:var(--green);color:#11111b;border:0;font-weight:700}
  button.accent{background:var(--mauve);color:#11111b;border:0;font-weight:700}
  button:disabled{opacity:.45;cursor:default}
  #status{font-size:12px;color:var(--sub);min-width:90px}
  #status.ok{color:var(--green)} #status.err{color:var(--red)} #status.busy{color:var(--yellow)}
  #status.dirty{color:var(--peach)}
  .wrap{display:flex;height:calc(100vh - 47px)}
  .side{width:218px;background:var(--mantle);border-right:1px solid var(--surface);padding:10px;overflow:auto;flex:none}
  .side h3{margin:6px 0 4px;color:var(--peach);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  .layer{display:flex;align-items:center;gap:8px;padding:3px 4px;border-radius:6px;cursor:pointer}
  .layer:hover{background:var(--surface)}
  .layer .sw{width:12px;height:12px;border-radius:3px;flex:none}
  .layer .ct{margin-left:auto;color:var(--sub);font-size:11px}
  .layer input{accent-color:var(--mauve)}
  .stage{flex:1;position:relative;overflow:hidden}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas.drag{cursor:grabbing}
  .hud{position:absolute;left:10px;bottom:10px;background:rgba(17,17,27,.8);border:1px solid var(--surface);border-radius:6px;padding:6px 10px;color:var(--sub);font-size:11px;pointer-events:none}
  .help{position:absolute;right:10px;bottom:10px;background:rgba(17,17,27,.8);border:1px solid var(--surface);border-radius:6px;padding:6px 10px;color:var(--sub);font-size:11px;pointer-events:none;text-align:right}
  .insp{width:296px;background:var(--mantle);border-left:1px solid var(--surface);padding:10px;overflow:auto;flex:none}
  .insp h3{margin:0 0 4px;color:var(--teal);font-size:13px}
  .insp .ty{color:var(--peach);font-weight:700}
  .insp .meta{color:var(--sub);font-size:11px;margin-bottom:6px}
  .row{display:flex;align-items:center;gap:6px;padding:2px 0;border-bottom:1px solid var(--surface)}
  .row .k{color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px}
  .row input[type=text],.row input[type=number]{width:128px;background:var(--surface);color:var(--green);border:1px solid var(--surface2);border-radius:5px;padding:2px 5px;font:inherit;font-size:11.5px}
  .row input[type=checkbox]{accent-color:var(--green)}
  .row .ro{color:var(--sub);font-size:11px;max-width:140px;word-break:break-word;text-align:right}
  .empty{color:var(--sub)}
  .delbar{margin-top:10px}
  .delbar button{background:var(--red);color:#11111b;border:0;font-weight:700}
  code{color:var(--peach)}
</style>
</head>
<body>
<header>
  <h1>🗺️ Revenant Editor</h1>
  <select id="lvlSel" title="level"></select>
  <span class="medals" title="medal times (gold/silver/bronze)">🥇<input type="number" id="t0" step="0.1">🥈<input type="number" id="t1" step="0.1">🥉<input type="number" id="t2" step="0.1"></span>
  <span class="spacer"></span>
  <input type="password" id="key" placeholder="per-level key (hex)" size="20" title="needed only to Export; stored locally, never committed">
  <button class="primary" id="saveBtn" onclick="save()" disabled>Save</button>
  <button class="accent" id="exportBtn" onclick="exportDat()">Export .dat</button>
  <span id="status">ready</span>
</header>
<div class="wrap">
  <div class="side">
    <h3>Layers</h3>
    <div id="layers"></div>
    <h3 style="margin-top:12px">View</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button onclick="fitToView();draw()">⤢ Fit</button>
      <button onclick="toggleLabels()">🏷 Labels</button>
    </div>
    <h3 style="margin-top:12px">Edit</h3>
    <div id="legend" style="font-size:11px;color:var(--sub)"></div>
  </div>
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="hud" id="hud"></div>
    <div class="help">drag handle = reshape · drag body = move<br>click = select · drag empty = pan · wheel = zoom</div>
  </div>
  <div class="insp">
    <h3>Inspector</h3>
    <div id="inspBody"><p class="empty">Click an entity to select. Drag its handles to reshape, drag its body to move.</p></div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
const cv=$('#cv'), ctx=cv.getContext('2d');

const LAYERS = {
  terrain:  {label:'Terrain (physics)', color:'#a6e3a1', on:true},
  sprites:  {label:'Sprites',           color:'#89b4fa', on:true},
  triggers: {label:'Triggers',          color:'#f9e2af', on:true},
  joints:   {label:'Joints',            color:'#cba6f7', on:true},
  markers:  {label:'Start / Win / Cam', color:'#f5c2e7', on:true},
};
let LID=null, LEVEL=null, ENTS=[], showLabels=false, selected=null, dirty=false, KEYS={};
let view={x:0,y:0,scale:1};

function layerOf(t){
  if(t==='EditorPhysicsObject'||t==='EditorPhysicsEntity') return 'terrain';
  if(t==='EditorSprite'||t==='ComposedSprite') return 'sprites';
  if(t==='EditorTrigger'||t==='WaterTrigger') return 'triggers';
  if(t&&t.indexOf('Joint')>=0) return 'joints';
  return 'markers';
}
function posOf(p){
  const P=p.Properties||{};
  if(Array.isArray(P.position)&&P.position.length===2) return {x:P.position[0],y:P.position[1]};
  if(p.Vertexes&&p.Vertexes.length){let sx=0,sy=0;p.Vertexes.forEach(v=>{sx+=v.x;sy+=v.y});return{x:sx/p.Vertexes.length,y:sy/p.Vertexes.length};}
  if(Array.isArray(p.Anchors)&&p.Anchors.length) return {x:p.Anchors[0].x,y:p.Anchors[0].y};
  return null;
}
// translate a whole entity by a world delta
function translate(e,dwx,dwy){
  if(e.Vertexes) e.Vertexes.forEach(v=>{v.x+=dwx;v.y+=dwy;});
  const P=e.Properties||{};
  if(Array.isArray(P.position)){P.position[0]+=dwx;P.position[1]+=dwy;}
  if(Array.isArray(e.Anchors)) e.Anchors.forEach(a=>{a.x+=dwx;a.y+=dwy;});
}

function s2w(sx,sy){return{x:view.x+(sx-cv.width/2)/view.scale, y:view.y-(sy-cv.height/2)/view.scale};}
function wx(x){return cv.width/2+(x-view.x)*view.scale;}
function wy(y){return cv.height/2-(y-view.y)*view.scale;}
function bounds(){
  let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9,any=false;
  const acc=(x,y)=>{any=true;if(x<mnx)mnx=x;if(y<mny)mny=y;if(x>mxx)mxx=x;if(y>mxy)mxy=y;};
  ENTS.forEach(e=>{(e.Vertexes||[]).forEach(v=>acc(v.x,v.y));const pt=posOf(e);if(pt)acc(pt.x,pt.y);(e.Anchors||[]).forEach(a=>acc(a.x,a.y));});
  if(!any) return {mnx:-100,mny:-100,mxx:100,mxy:100};
  return {mnx,mny,mxx,mxy};
}
function fitToView(){
  const b=bounds(),W=cv.width,H=cv.height;
  const spanx=Math.max(b.mxx-b.mnx,1),spany=Math.max(b.mxy-b.mny,1);
  view.scale=Math.min(W/spanx,H/spany)*0.92; view.x=(b.mnx+b.mxx)/2; view.y=(b.mny+b.mxy)/2;
}
function catmull(pts,closed){
  if(pts.length<3) return pts.slice();
  const out=[],n=pts.length;
  const get=i=>closed?pts[(i%n+n)%n]:pts[Math.max(0,Math.min(n-1,i))];
  const last=closed?n:n-1;
  for(let i=0;i<last;i++){
    const p0=get(i-1),p1=get(i),p2=get(i+1),p3=get(i+2);
    const seg=Math.max(1,Math.round((pts[i].segments)||4));
    for(let j=0;j<seg;j++){const t=j/seg,t2=t*t,t3=t2*t;
      out.push({x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
                y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)});}
  }
  if(!closed) out.push(pts[n-1]); return out;
}
function outline(e){
  const vs=e.Vertexes||[]; if(vs.length<2) return null;
  return (e.Properties&&e.Properties.spline)?catmull(vs,true):vs.map(v=>({x:v.x,y:v.y}));
}

function draw(){
  const W=cv.width,H=cv.height;
  ctx.fillStyle='#181825'; ctx.fillRect(0,0,W,H); drawGrid();
  if(LAYERS.terrain.on) ENTS.forEach(e=>{if(layerOf(e.Type)==='terrain')drawPhysics(e);});
  if(LAYERS.joints.on) ENTS.forEach(e=>{if(layerOf(e.Type)==='joints')drawJoint(e);});
  if(LAYERS.triggers.on) ENTS.forEach(e=>{if(layerOf(e.Type)==='triggers')drawTrigger(e);});
  if(LAYERS.sprites.on) ENTS.forEach(e=>{if(layerOf(e.Type)==='sprites')drawSprite(e);});
  if(LAYERS.markers.on) ENTS.forEach(e=>{if(layerOf(e.Type)==='markers')drawMarker(e);});
  if(selected) drawSelected(selected);
}
function drawGrid(){
  const b=s2w(0,0),e=s2w(cv.width,cv.height);
  let step=Math.pow(10,Math.floor(Math.log10((e.x-b.x)/10))); if(!isFinite(step)||step<=0)step=100;
  ctx.lineWidth=1; ctx.strokeStyle='rgba(69,71,90,.35)';
  for(let x=Math.ceil(b.x/step)*step;x<e.x;x+=step){const sx=wx(x);ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,cv.height);ctx.stroke();}
  for(let y=Math.floor(b.y/step)*step;y<e.y;y+=step){const sy=wy(y);ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(cv.width,sy);ctx.stroke();}
  ctx.strokeStyle='rgba(137,180,250,.25)';
  ctx.beginPath();ctx.moveTo(wx(0),0);ctx.lineTo(wx(0),cv.height);ctx.moveTo(0,wy(0));ctx.lineTo(cv.width,wy(0));ctx.stroke();
}
function drawPhysics(e){
  if(e.Type==='EditorPhysicsEntity') return drawMarker(e);
  const poly=outline(e); if(!poly) return;
  ctx.beginPath(); poly.forEach((p,i)=>i?ctx.lineTo(wx(p.x),wy(p.y)):ctx.moveTo(wx(p.x),wy(p.y))); ctx.closePath();
  ctx.fillStyle='rgba(166,227,161,.10)'; ctx.fill(); ctx.lineWidth=1.5; ctx.strokeStyle='#a6e3a1'; ctx.stroke();
}
function drawSprite(e){
  const pt=posOf(e); if(!pt)return; const sx=wx(pt.x),sy=wy(pt.y);
  ctx.fillStyle='rgba(137,180,250,.9)'; ctx.beginPath(); ctx.arc(sx,sy,2.5,0,7); ctx.fill();
  if(showLabels){const f=(e.Properties&&(e.Properties.frame||e.Properties.name))||'';if(f){ctx.fillStyle='#6c7086';ctx.font='9px monospace';ctx.fillText(f,sx+4,sy-3);}}
}
function drawTrigger(e){
  const pt=posOf(e); if(!pt)return; const sx=wx(pt.x),sy=wy(pt.y);
  const r=(e.Properties&&e.Properties.radius)||0;
  ctx.strokeStyle='rgba(249,226,175,.8)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.arc(sx,sy,Math.max(4,r*view.scale),0,7); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#f9e2af'; ctx.beginPath(); ctx.arc(sx,sy,2,0,7); ctx.fill();
}
function drawJoint(e){
  const a=e.Anchors||[]; if(!a.length)return; ctx.strokeStyle='#cba6f7'; ctx.lineWidth=1.5;
  if(a.length>=2){ctx.beginPath();ctx.moveTo(wx(a[0].x),wy(a[0].y));ctx.lineTo(wx(a[1].x),wy(a[1].y));ctx.stroke();}
  a.forEach(an=>{const sx=wx(an.x),sy=wy(an.y);ctx.beginPath();ctx.moveTo(sx-3,sy-3);ctx.lineTo(sx+3,sy+3);ctx.moveTo(sx+3,sy-3);ctx.lineTo(sx-3,sy+3);ctx.stroke();});
}
function drawMarker(e){
  const pt=posOf(e); if(!pt)return; const sx=wx(pt.x),sy=wy(pt.y);
  let c='#f5c2e7',g='◆',label='';
  if(e.Type==='Moto'){c='#a6e3a1';g='🏍';label='START';}
  else if(e.Type==='TriggerWin'){c='#f38ba8';g='🏁';label='WIN';}
  else if(e.Type==='EditorCamera'){c='#94e2d5';g='🎥';label='CAM';}
  else if(e.Type==='ExplosiveBarrel'){c='#fab387';g='💥';}
  else if(e.Type==='EditorPhysicsEntity'){c='#a6e3a1';g='▣';}
  ctx.font='15px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(g,sx,sy);ctx.textAlign='left';ctx.textBaseline='alphabetic';
  if(label){ctx.fillStyle=c;ctx.font='bold 10px monospace';ctx.fillText(label,sx+10,sy-6);}
}
function drawSelected(e){
  const pt=posOf(e); if(!pt)return; const sx=wx(pt.x),sy=wy(pt.y);
  ctx.strokeStyle='#f5c2e7'; ctx.lineWidth=2;
  const poly=outline(e);
  if(poly&&layerOf(e.Type)==='terrain'){
    ctx.beginPath();poly.forEach((p,i)=>i?ctx.lineTo(wx(p.x),wy(p.y)):ctx.moveTo(wx(p.x),wy(p.y)));ctx.closePath();ctx.stroke();
    (e.Vertexes||[]).forEach((v,i)=>{ctx.fillStyle=(i===hoverVtx)?'#f9e2af':'#f5c2e7';ctx.beginPath();ctx.arc(wx(v.x),wy(v.y),4,0,7);ctx.fill();});
  } else { ctx.beginPath(); ctx.arc(sx,sy,11,0,7); ctx.stroke(); }
}

// ── interaction: select / drag-vertex / move / pan ──────────────────────────
let down=false, last=null, moved=0, mode=null, dragVtx=-1, hoverVtx=-1;
function vertexAt(e,m){ // index of selected terrain vertex under cursor (screen), or -1
  if(!e||!e.Vertexes) return -1;
  for(let i=0;i<e.Vertexes.length;i++){const v=e.Vertexes[i];const dx=wx(v.x)-m.x,dy=wy(v.y)-m.y;if(dx*dx+dy*dy<=36)return i;}
  return -1;
}
function localM(ev){const r=cv.getBoundingClientRect();return{x:ev.clientX-r.left,y:ev.clientY-r.top};}
cv.addEventListener('mousedown',ev=>{
  down=true;moved=0;last={x:ev.clientX,y:ev.clientY};cv.classList.add('drag');
  const m=localM(ev);
  dragVtx=vertexAt(selected,m);
  if(dragVtx>=0){mode='vertex';return;}
  const hit=pick(m);
  if(hit){ if(hit!==selected){selected=hit;renderInspector();} mode='move'; }
  else { mode='pan'; }
});
window.addEventListener('mouseup',()=>{
  if(down&&mode==='pan'&&moved<4){selected=null;renderInspector();draw();}
  if((mode==='vertex'||mode==='move')&&moved>3) markDirty();
  down=false;mode=null;dragVtx=-1;cv.classList.remove('drag');
});
window.addEventListener('mousemove',ev=>{
  const m=localM(ev),w=s2w(m.x,m.y);
  $('#hud').textContent=`world (${w.x.toFixed(0)}, ${w.y.toFixed(0)})  ·  ${view.scale.toFixed(2)} px/u  ·  ${ENTS.length} ents${dirty?'  ·  ● unsaved':''}`;
  if(!down){ const hv=vertexAt(selected,m); if(hv!==hoverVtx){hoverVtx=hv;draw();} return; }
  const dx=ev.clientX-last.x, dy=ev.clientY-last.y; moved+=Math.abs(dx)+Math.abs(dy);
  const dwx=dx/view.scale, dwy=-dy/view.scale;
  if(mode==='pan'){ view.x-=dwx; view.y-=dwy; }
  else if(mode==='vertex'&&selected){ const v=selected.Vertexes[dragVtx]; v.x+=dwx; v.y+=dwy; }
  else if(mode==='move'&&selected){ translate(selected,dwx,dwy); }
  last={x:ev.clientX,y:ev.clientY}; draw();
});
cv.addEventListener('wheel',ev=>{
  ev.preventDefault(); const m=localM(ev); const before=s2w(m.x,m.y);
  view.scale*= ev.deltaY<0?1.1:1/1.1; const after=s2w(m.x,m.y);
  view.x+=before.x-after.x; view.y+=before.y-after.y; draw();
},{passive:false});

function pick(m){
  let best=null,bd=14*14;
  ENTS.forEach(ent=>{if(!LAYERS[layerOf(ent.Type)].on)return;const pt=posOf(ent);if(!pt)return;
    const dx=wx(pt.x)-m.x,dy=wy(pt.y)-m.y,d=dx*dx+dy*dy;if(d<bd){bd=d;best=ent;}});
  if(!best){for(const ent of ENTS){if(layerOf(ent.Type)!=='terrain'||!LAYERS.terrain.on)continue;const poly=outline(ent);if(poly&&pointIn(poly,m)){best=ent;break;}}}
  return best;
}
function pointIn(poly,m){let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=wx(poly[i].x),yi=wy(poly[i].y),xj=wx(poly[j].x),yj=wy(poly[j].y);if(((yi>m.y)!==(yj>m.y))&&(m.x<(xj-xi)*(m.y-yi)/(yj-yi)+xi))inside=!inside;}return inside;}

// ── editable inspector ──────────────────────────────────────────────────────
function renderInspector(){
  const b=$('#inspBody');
  if(!selected){b.innerHTML='<p class="empty">Click an entity to select. Drag its handles to reshape, drag its body to move.</p>';return;}
  const e=selected,P=e.Properties||{};
  let h=`<div class="ty">${e.Type}</div>`;
  if(e.Vertexes) h+=`<div class="meta">${e.Vertexes.length} vertexes${P.spline?' · spline (drag yellow handles)':''}</div>`;
  Object.keys(P).sort().forEach(k=>{ h+=field(k,P[k]); });
  h+=`<div class="delbar"><button onclick="delEntity()">🗑 Delete entity</button></div>`;
  b.innerHTML=h;
}
function field(k,v){
  const id='f_'+k.replace(/[^A-Za-z0-9]/g,'_');
  if(typeof v==='boolean') return `<div class="row"><span class="k">${k}</span><input type="checkbox" ${v?'checked':''} onchange="setProp('${k}',this.checked)"></div>`;
  if(typeof v==='number') return `<div class="row"><span class="k">${k}</span><input type="number" step="any" value="${v}" onchange="setProp('${k}',parseFloat(this.value))"></div>`;
  if(typeof v==='string') return `<div class="row"><span class="k">${k}</span><input type="text" value="${esc(v)}" onchange="setProp('${k}',this.value)"></div>`;
  if(Array.isArray(v)&&v.every(x=>typeof x==='number')) return `<div class="row"><span class="k">${k}</span><input type="text" value="${v.join(', ')}" onchange="setArr('${k}',this.value)"></div>`;
  return `<div class="row"><span class="k">${k}</span><span class="ro">${esc(JSON.stringify(v))}</span></div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function setProp(k,v){selected.Properties[k]=v;markDirty();}
function setArr(k,s){const a=s.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));if(a.length){selected.Properties[k]=a;markDirty();draw();}}
function delEntity(){const i=ENTS.indexOf(selected);if(i>=0){ENTS.splice(i,1);selected=null;renderInspector();buildLayers();markDirty();draw();}}

// ── chrome ───────────────────────────────────────────────────────────────────
function buildLayers(){
  const counts={}; ENTS.forEach(e=>{const L=layerOf(e.Type);counts[L]=(counts[L]||0)+1;});
  const box=$('#layers'); box.innerHTML='';
  Object.entries(LAYERS).forEach(([k,L])=>{
    const row=document.createElement('label'); row.className='layer';
    row.innerHTML=`<input type="checkbox" ${L.on?'checked':''}><span class="sw" style="background:${L.color}"></span>${L.label}<span class="ct">${counts[k]||0}</span>`;
    row.querySelector('input').onchange=ev=>{L.on=ev.target.checked;draw();};
    box.appendChild(row);
  });
  $('#legend').innerHTML='🏍 start · 🏁 win · 🎥 cam · 💥 barrel<br>drag yellow dots to reshape terrain<br>edit fields in the inspector →';
}
function toggleLabels(){showLabels=!showLabels;draw();}
function markDirty(){dirty=true;$('#saveBtn').disabled=false;setStatus('● unsaved','dirty');}
function setStatus(t,cls){const s=$('#status');s.textContent=t;s.className=cls||'';}

function readTimes(){return [0,1,2].map(i=>{const v=parseFloat($('#t'+i).value);return isNaN(v)?(LEVEL.times[i]||0):v;});}
['t0','t1','t2'].forEach(id=>$('#'+id).addEventListener('change',()=>{LEVEL.times=readTimes();markDirty();}));

async function save(){
  LEVEL.times=readTimes(); LEVEL.Entities=ENTS;
  setStatus('saving…','busy');
  const r=await fetch('/api/level/'+encodeURIComponent(LID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(LEVEL)});
  const d=await r.json();
  if(d.ok){dirty=false;$('#saveBtn').disabled=true;setStatus('✓ saved ('+d.entities+' ents)','ok');}
  else setStatus('✗ '+d.error,'err');
  return d.ok;
}
async function exportDat(){
  if(dirty){ if(!await save()) return; }
  const key=$('#key').value.trim();
  if(!key && !KEYS[LID]){ setStatus('✗ enter the per-level key','err'); $('#key').focus(); return; }
  setStatus('encrypting… (~1 min, runs cipher oracle)','busy'); $('#exportBtn').disabled=true;
  try{
    const r=await fetch('/api/export/'+encodeURIComponent(LID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,remember:true})});
    const d=await r.json();
    if(d.ok){setStatus('✓ wrote '+d.path+' ('+d.bytes+' B)','ok');KEYS[LID]=true;}
    else setStatus('✗ '+d.error,'err');
  }catch(e){setStatus('✗ '+e,'err');}
  $('#exportBtn').disabled=false;
}

async function loadLevel(lid){
  LID=lid; const r=await fetch('/api/level/'+encodeURIComponent(lid)); LEVEL=await r.json();
  ENTS=LEVEL.Entities||[]; selected=null; dirty=false; hoverVtx=-1; renderInspector();
  const t=LEVEL.times||[0,0,0]; $('#t0').value=t[0]; $('#t1').value=t[1]; $('#t2').value=t[2];
  $('#saveBtn').disabled=true;
  $('#key').placeholder = KEYS[lid] ? 'key on file ✓' : 'per-level key (hex)';
  setStatus(KEYS[lid]?'ready (key on file)':'ready');
  buildLayers(); resize(); fitToView(); draw();
}
async function init(){
  const kr=await fetch('/api/keys'); KEYS=(await kr.json()).have||{};
  const r=await fetch('/api/levels'); const d=await r.json();
  const sel=$('#lvlSel'); sel.innerHTML='';
  (d.levels||[]).forEach(l=>{const o=document.createElement('option');o.value=o.textContent=l;sel.appendChild(o);});
  sel.onchange=()=>{ if(dirty&&!confirm('Discard unsaved changes?')){sel.value=LID;return;} loadLevel(sel.value); };
  if(d.levels&&d.levels.length) loadLevel(d.levels[0]);
  else $('#inspBody').innerHTML='<p class="empty">No cached levels. Import one (see README).</p>';
}
function resize(){const r=cv.parentElement.getBoundingClientRect();cv.width=r.width;cv.height=r.height;}
window.addEventListener('resize',()=>{resize();draw();});
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});
init();
</script>
</body>
</html>
