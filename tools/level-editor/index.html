<!DOCTYPE html>
<html lang="en" data-theme="unity-dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Revenant — Level Editor</title>
<style>
  /* ── palettes (grounded in Unity's editor grays / a neutral pro-light) ── */
  :root[data-theme="unity-dark"]{
    --app-toolbar-bg:#191919; --panel-bg:#383838; --panel-bg-alt:#2d2d2d; --viewport-bg:#282828;
    --header-bg:#3c3c3c; --border:#232323; --border-strong:#1b1b1b; --input-border:#212121;
    --text:#d2d2d2; --text-muted:#a0a0a0; --text-faint:#6e6e6e; --text-on-accent:#fff;
    --field-bg:#2a2a2a; --field-bg-focus:#303030; --button-bg:#585858; --button-bg-hover:#676767; --button-bg-active:#46607c;
    --accent:#4c7eff; --selection-bg:#2c5d87; --hover-bg:#ffffff14;
    --axis-x:#e0584e; --axis-y:#6fbf4f; --grid-minor:#ffffff0d; --grid-major:#ffffff1a;
    --terrain:#7fd07f; --sprite:#89b4fa; --trigger:#e6c763; --joint:#b69cf0; --marker:#e8a0c8;
  }
  :root[data-theme="pro-light"]{
    --app-toolbar-bg:#e8e8e8; --panel-bg:#f3f3f3; --panel-bg-alt:#ececec; --viewport-bg:#cfcfcf;
    --header-bg:#e0e0e0; --border:#c8c8c8; --border-strong:#b0b0b0; --input-border:#bfbfbf;
    --text:#1f1f1f; --text-muted:#5a5a5a; --text-faint:#8a8a8a; --text-on-accent:#fff;
    --field-bg:#fff; --field-bg-focus:#fff; --button-bg:#e2e2e2; --button-bg-hover:#d6d6d6; --button-bg-active:#c4d9f2;
    --accent:#2563eb; --selection-bg:#cfe2ff; --hover-bg:#00000008;
    --axis-x:#d43a2f; --axis-y:#2fa049; --grid-minor:#00000010; --grid-major:#0000001f;
    --terrain:#3a8f3a; --sprite:#2563eb; --trigger:#b88a16; --joint:#7a52c8; --marker:#c43d8f;
  }
  :root{
    --font-ui:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-mono:"SF Mono","Cascadia Mono","JetBrains Mono",Consolas,monospace;
    --fs-base:12px; --fs-small:11px; --row-h:22px; --toolbar-h:40px; --statusbar-h:24px;
    --radius:3px; --icon:16px; --left-w:288px; --right-w:300px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font:var(--fs-base)/1.45 var(--font-ui);background:var(--viewport-bg);color:var(--text);
    user-select:none;-webkit-user-select:none}
  .mono{font-family:var(--font-mono)}
  button{font:inherit;color:var(--text);background:var(--button-bg);border:1px solid var(--border);
    border-radius:var(--radius);padding:3px 9px;cursor:pointer}
  button:hover{background:var(--button-bg-hover)}
  button:disabled{opacity:.45;cursor:default}
  button.tool{background:transparent;border:1px solid transparent;width:28px;height:26px;padding:0;font-size:14px}
  button.tool:hover{background:var(--hover-bg)}
  button.tool.on{background:var(--button-bg-active);border-color:var(--accent);color:#fff}
  input,select{font:inherit;color:var(--text);background:var(--field-bg);border:1px solid var(--input-border);
    border-radius:var(--radius);padding:2px 5px}
  input:focus,select:focus{outline:1px solid var(--accent);background:var(--field-bg-focus)}

  /* app shell */
  .app{display:grid;height:100vh;
    grid-template-columns:var(--left-w) 4px 1fr 4px var(--right-w);
    grid-template-rows:var(--toolbar-h) 1fr var(--statusbar-h);
    grid-template-areas:"toolbar toolbar toolbar toolbar toolbar" "left ls viewport rs right" "status status status status status";}
  .toolbar{grid-area:toolbar;background:var(--app-toolbar-bg);border-bottom:1px solid var(--border-strong);
    display:flex;align-items:center;gap:6px;padding:0 10px}
  .toolbar .brand{font-weight:600;font-size:13px;letter-spacing:.02em;margin-right:6px}
  .toolbar .sep{width:1px;height:22px;background:var(--border);margin:0 4px}
  .toolbar .grow{flex:1}
  .toolbar .lvl{font-size:var(--fs-small);color:var(--text-muted)}
  .left{grid-area:left} .right{grid-area:right}
  .left,.right{background:var(--panel-bg);overflow:hidden;display:flex;flex-direction:column}
  .left{border-right:1px solid var(--border-strong)} .right{border-left:1px solid var(--border-strong)}
  .splitter{background:var(--border-strong);cursor:col-resize} .splitter.ls{grid-area:ls} .splitter.rs{grid-area:rs}
  .splitter:hover{background:var(--accent)}
  .viewport{grid-area:viewport;position:relative;background:var(--viewport-bg);overflow:hidden}
  .status{grid-area:status;background:var(--app-toolbar-bg);border-top:1px solid var(--border-strong);
    display:flex;align-items:center;gap:16px;padding:0 12px;font-size:var(--fs-small);color:var(--text-muted)}
  .status .mono{color:var(--text)}

  /* panel chrome */
  .ptitle{height:26px;display:flex;align-items:center;padding:0 10px;background:var(--header-bg);
    border-bottom:1px solid var(--border);font-size:var(--fs-small);font-weight:600;
    text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);flex:none}
  .psearch{padding:6px;flex:none;border-bottom:1px solid var(--border)}
  .psearch input{width:100%}
  .pscroll{overflow:auto;flex:1}

  /* hierarchy */
  .grp{}
  .grp>.ghead{display:flex;align-items:center;height:var(--row-h);padding:0 6px;cursor:pointer;color:var(--text);font-weight:600}
  .grp>.ghead:hover{background:var(--hover-bg)}
  .grp>.ghead .tri{width:12px;color:var(--text-faint);font-size:9px}
  .grp>.ghead .gname{margin-left:2px}
  .grp>.ghead .gcount{margin-left:auto;color:var(--text-faint);font-size:var(--fs-small);font-weight:400}
  .row{display:flex;align-items:center;height:var(--row-h);padding:0 6px 0 20px;cursor:pointer;white-space:nowrap}
  .row:hover{background:var(--hover-bg)}
  .row.sel{background:var(--selection-bg);color:#fff}
  .row .ico{width:16px;text-align:center;color:var(--text-muted);flex:none}
  .row.sel .ico{color:#fff}
  .row .nm{margin-left:5px;overflow:hidden;text-overflow:ellipsis}
  .row.hidden .nm{color:var(--text-faint);font-style:italic}
  .row .eye{margin-left:auto;width:18px;text-align:center;color:var(--text-faint);visibility:hidden}
  .row:hover .eye,.row.hidden .eye{visibility:visible}

  /* inspector */
  .insp-empty{padding:16px;color:var(--text-faint);text-align:center}
  .fold{border-bottom:1px solid var(--border)}
  .fold>.fhead{display:flex;align-items:center;height:24px;padding:0 8px;cursor:pointer;background:var(--panel-bg-alt);
    font-size:var(--fs-small);font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
  .fold>.fhead .tri{width:12px;color:var(--text-faint);font-size:9px}
  .fbody{padding:4px 8px 8px}
  .f{display:flex;align-items:center;min-height:22px;gap:6px}
  .f label{flex:0 0 42%;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .f label.scrub{cursor:ew-resize}
  .f label.scrub:hover{color:var(--accent)}
  .f .ctl{flex:1;display:flex;gap:4px;align-items:center}
  .f input[type=number],.f input[type=text]{width:100%;font-family:var(--font-mono);font-size:var(--fs-small);text-align:right}
  .f input[type=text]{text-align:left}
  .f .axis{flex:0 0 auto;font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:9px;text-align:center}
  .f .axis.x{color:var(--axis-x)} .f .axis.y{color:var(--axis-y)}
  .f input[type=range]{flex:1;accent-color:var(--accent)}
  .f .rv{flex:0 0 46px;text-align:right;font-family:var(--font-mono);font-size:var(--fs-small);color:var(--text)}
  .f .ro{flex:1;text-align:right;color:var(--text-muted);font-family:var(--font-mono);font-size:var(--fs-small);word-break:break-all}
  .typechip{display:inline-block;padding:1px 7px;border-radius:9px;background:var(--button-bg-active);color:#fff;font-size:10px}
  .thumb{width:100%;height:64px;background:var(--viewport-bg) center/contain no-repeat;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;image-rendering:auto}
  .delrow{padding:8px}
  .delrow button{width:100%;background:#7a2f33;border-color:#933;color:#fdd}
  .delrow button:hover{background:#933}
  .hud{position:absolute;left:8px;bottom:8px;background:#0009;border:1px solid var(--border);border-radius:var(--radius);
    padding:3px 8px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);pointer-events:none}
  #status .seg{display:flex;align-items:center;gap:5px}
  #key{width:150px}
  #stat{margin-left:auto}
  #stat.ok{color:var(--axis-y)} #stat.err{color:var(--axis-x)} #stat.busy{color:var(--trigger)} #stat.dirty{color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <!-- ── toolbar ── -->
  <div class="toolbar">
    <span class="brand">🜂 Revenant</span>
    <select id="lvlSel" title="open level"></select>
    <span class="sep"></span>
    <button class="tool" id="tSelect" title="Select (Q)" onclick="setTool('select')">⮰</button>
    <button class="tool" id="tMove" title="Move (W)" onclick="setTool('move')">✥</button>
    <button class="tool" id="tRotate" title="Rotate (E)" onclick="setTool('rotate')">↻</button>
    <button class="tool" id="tPan" title="Pan (Space)" onclick="setTool('pan')">✋</button>
    <span class="sep"></span>
    <button class="tool" id="bGrid" title="Toggle grid" onclick="toggleGrid()">▦</button>
    <button class="tool" id="bSnap" title="Grid snap" onclick="toggleSnap()">⊞</button>
    <button class="tool" id="bArt" title="Toggle sprite art" onclick="toggleArt()">🖼</button>
    <button class="tool" id="bFit" title="Frame all (A)" onclick="frameAll()">⤢</button>
    <span class="sep"></span>
    <label style="font-size:11px;color:var(--text-muted)" title="sprite content-scale (texels→units); tune to match the green outline">scale<input type="number" id="cscale" value="4" step="0.5" min="0.5" style="width:48px;margin-left:4px" oninput="SPRITE_CS=Math.max(0.1,+this.value)||4;draw()"></label>
    <span class="grow"></span>
    <input id="key" type="password" placeholder="level key (hex)" title="needed to Export; stored locally, never committed">
    <button id="saveBtn" onclick="save()" disabled>Save</button>
    <button id="exportBtn" onclick="exportDat()">Export .dat</button>
    <span class="sep"></span>
    <button class="tool" id="bTheme" title="Toggle theme" onclick="toggleTheme()">◐</button>
  </div>

  <!-- ── hierarchy ── -->
  <div class="left">
    <div class="ptitle">Hierarchy</div>
    <div class="psearch"><input id="filter" placeholder="filter…  (try t:sprite)" oninput="renderTree()"></div>
    <div class="pscroll" id="tree"></div>
  </div>
  <div class="splitter ls" id="lsplit"></div>

  <!-- ── viewport ── -->
  <div class="viewport">
    <canvas id="cv"></canvas>
    <div class="hud" id="hud"></div>
  </div>
  <div class="splitter rs" id="rsplit"></div>

  <!-- ── inspector ── -->
  <div class="right">
    <div class="ptitle">Inspector</div>
    <div class="pscroll" id="insp"><div class="insp-empty">No selection</div></div>
  </div>

  <!-- ── status bar ── -->
  <div class="status" id="status">
    <span class="seg">📐 <span class="mono" id="sCur">0, 0</span></span>
    <span class="seg">🔍 <span class="mono" id="sZoom">100%</span></span>
    <span class="seg" id="sCount">0 entities</span>
    <span class="seg" id="sSel">—</span>
    <span class="seg" id="stat">ready</span>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
const cv=$('#cv'), ctx=cv.getContext('2d');

// ── type metadata ────────────────────────────────────────────────────────────
const TYPEMETA={
  EditorPhysicsObject:{group:'Terrain',icon:'◢'}, EditorPhysicsEntity:{group:'Terrain',icon:'▣'},
  EditorSprite:{group:'Sprites',icon:'▦'}, ComposedSprite:{group:'Sprites',icon:'▤'},
  Moto:{group:'Gameplay',icon:'⚑'}, TriggerWin:{group:'Gameplay',icon:'🏁'}, ExplosiveBarrel:{group:'Gameplay',icon:'💥'},
  EditorTrigger:{group:'Triggers',icon:'▸'}, WaterTrigger:{group:'Triggers',icon:'≈'},
  EditorCamera:{group:'Cameras',icon:'🎥'},
};
const GROUP_ORDER=['Gameplay','Terrain','Sprites','Triggers','Joints','Cameras','Misc'];
const BIG_GROUPS=new Set(['Terrain','Sprites']);   // collapsed by default
function metaFor(t){ if(TYPEMETA[t])return TYPEMETA[t]; if(t&&t.indexOf('Joint')>=0)return{group:'Joints',icon:'⛓'}; return{group:'Misc',icon:'◇'}; }
function groupOf(e){return metaFor(e.Type).group;}
function nameOf(e){const n=(e.Properties||{}).name; return (n&&String(n).trim())?n:`${e.Type} #${e._id}`;}

// ── state ────────────────────────────────────────────────────────────────────
let LID=null,LEVEL=null,ENTS=[],selected=null,dirty=false;
let view={x:0,y:0,scale:1}, tool='select';
let showGrid=true, snap=false, snapStep=20, showArt=true;
let SPRITE_CS=4;     // atlas content-scale: texels → level units (2× retina × 2× level scale).
                     // calibrated from a mounted sprite (t1_wheel 203px → fits a 61u bar at ÷4).
                     // live-tunable via the toolbar so you can match the green outline.
let hidden=new Set(), collapsed=new Set(BIG_GROUPS), foldOpen={Transform:true,Identity:true,Physics:true,Appearance:true,'Type-specific':true,Vertexes:true};
let KEYS={}, FRAMES={}, ATLAS={};   // atlas frame meta + Image objects
let FILLTEX={};                      // terrain fill textures (name → Image)
const LS=k=>'rvedit_'+k;

// ── coords ───────────────────────────────────────────────────────────────────
function s2w(sx,sy){return{x:view.x+(sx-cv.width/2)/view.scale,y:view.y-(sy-cv.height/2)/view.scale};}
function wx(x){return cv.width/2+(x-view.x)*view.scale;}
function wy(y){return cv.height/2-(y-view.y)*view.scale;}
function posOf(e){const P=e.Properties||{};
  if(Array.isArray(P.position)&&P.position.length===2)return{x:P.position[0],y:P.position[1]};
  if(e.Vertexes&&e.Vertexes.length){let sx=0,sy=0;e.Vertexes.forEach(v=>{sx+=v.x;sy+=v.y});return{x:sx/e.Vertexes.length,y:sy/e.Vertexes.length};}
  if(Array.isArray(e.Anchors)&&e.Anchors.length)return{x:e.Anchors[0].x,y:e.Anchors[0].y};
  return null;}
function translate(e,dx,dy){
  if(e.Vertexes)e.Vertexes.forEach(v=>{v.x+=dx;v.y+=dy;});
  const P=e.Properties||{}; if(Array.isArray(P.position)){P.position[0]+=dx;P.position[1]+=dy;}
  if(Array.isArray(e.Anchors))e.Anchors.forEach(a=>{a.x+=dx;a.y+=dy;});}
function entBounds(e){let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9,any=false;const acc=(x,y)=>{any=true;mnx=Math.min(mnx,x);mny=Math.min(mny,y);mxx=Math.max(mxx,x);mxy=Math.max(mxy,y);};
  (e.Vertexes||[]).forEach(v=>acc(v.x,v.y)); const pt=posOf(e); if(pt&&!e.Vertexes)acc(pt.x,pt.y); (e.Anchors||[]).forEach(a=>acc(a.x,a.y));
  if(!any){const p=posOf(e)||{x:0,y:0};return{mnx:p.x-20,mny:p.y-20,mxx:p.x+20,mxy:p.y+20};} return{mnx,mny,mxx,mxy};}
function sceneBounds(){let b={mnx:1e9,mny:1e9,mxx:-1e9,mxy:-1e9},any=false;ENTS.forEach(e=>{const eb=entBounds(e);any=true;b.mnx=Math.min(b.mnx,eb.mnx);b.mny=Math.min(b.mny,eb.mny);b.mxx=Math.max(b.mxx,eb.mxx);b.mxy=Math.max(b.mxy,eb.mxy);});return any?b:{mnx:-100,mny:-100,mxx:100,mxy:100};}
function frameBounds(b,pad=0.9){const W=cv.width,H=cv.height;const sx=Math.max(b.mxx-b.mnx,1),sy=Math.max(b.mxy-b.mny,1);view.scale=Math.min(W/sx,H/sy)*pad;view.x=(b.mnx+b.mxx)/2;view.y=(b.mny+b.mxy)/2;}
function frameAll(){frameBounds(sceneBounds());draw();}
function frameSel(){if(selected){frameBounds(entBounds(selected),0.55);draw();}}

// ── Catmull-Rom + outline ─────────────────────────────────────────────────────
function catmull(pts,closed){if(pts.length<3)return pts.slice();const out=[],n=pts.length;
  const get=i=>closed?pts[(i%n+n)%n]:pts[Math.max(0,Math.min(n-1,i))];const last=closed?n:n-1;
  for(let i=0;i<last;i++){const p0=get(i-1),p1=get(i),p2=get(i+1),p3=get(i+2);const seg=Math.max(1,Math.round((pts[i].segments)||4));
    for(let j=0;j<seg;j++){const t=j/seg,t2=t*t,t3=t2*t;out.push({x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)});}}
  if(!closed)out.push(pts[n-1]);return out;}
function outline(e){const vs=e.Vertexes||[];if(vs.length<2)return null;return(e.Properties&&e.Properties.spline)?catmull(vs,true):vs.map(v=>({x:v.x,y:v.y}));}

// ── render ────────────────────────────────────────────────────────────────────
function css(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function draw(){
  const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
  ctx.fillStyle=css('--viewport-bg'); ctx.fillRect(0,0,W,H);
  if(showGrid)drawGrid();
  // sprites (real art) sorted by z, behind terrain
  if(showArt) ENTS.filter(e=>!hidden.has(e._id)&&metaFor(e.Type).group==='Sprites').sort((a,b)=>((a.Properties||{}).z||0)-((b.Properties||{}).z||0)).forEach(drawSprite);
  ENTS.forEach(e=>{ if(hidden.has(e._id))return; const g=metaFor(e.Type).group;
    if(g==='Terrain')drawTerrain(e); else if(g==='Triggers')drawTrigger(e); else if(g==='Joints')drawJoint(e);
    else if(g==='Gameplay'||g==='Cameras'||g==='Misc')drawMarker(e);
    else if(g==='Sprites'&&!showArt)drawSpriteDot(e); });
  if(selected)drawGizmo(selected);
}
function drawGrid(){const b=s2w(0,0),e=s2w(cv.width,cv.height);
  let step=Math.pow(10,Math.floor(Math.log10((e.x-b.x)/10)));if(!isFinite(step)||step<=0)step=100;
  const draw1=(st,col)=>{ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();
    for(let x=Math.ceil(b.x/st)*st;x<e.x;x+=st){ctx.moveTo(wx(x),0);ctx.lineTo(wx(x),cv.height);}
    for(let y=Math.floor(b.y/st)*st;y<e.y;y+=st){ctx.moveTo(0,wy(y));ctx.lineTo(cv.width,wy(y));}ctx.stroke();};
  draw1(step,css('--grid-minor')); draw1(step*5,css('--grid-major'));}
function drawSprite(e){const P=e.Properties||{},pt=posOf(e);if(!pt)return;const fm=FRAMES[P.frame],img=fm&&ATLAS[fm.atlas];
  if(!fm||!img||!img.complete||!img.naturalWidth){return drawSpriteDot(e);}
  const [rx,ry,rw,rh]=fm.rect; let sw=fm.source[0]||rw, sh=fm.source[1]||rh;
  // atlas frames are in HD texels (@2x); level coords are points → ÷ content scale
  const scl=(P.scale||1)*view.scale/SPRITE_CS, dw=sw*scl, dh=sh*scl;
  ctx.save(); ctx.translate(wx(pt.x),wy(pt.y)); ctx.rotate((P.rotation||0)*Math.PI/180);
  ctx.globalAlpha=(P.opacity!=null?P.opacity:1);
  ctx.scale(1,-1);   // game textures are Y-up; canvas is Y-down → flip content vertically
  if(fm.rotated){ ctx.rotate(Math.PI/2); ctx.drawImage(img,rx,ry,rw,rh,-dh/2,-dw/2,dh,dw); }
  else { ctx.drawImage(img,rx,ry,rw,rh,-dw/2,-dh/2,dw,dh); }
  ctx.restore();}
function drawSpriteDot(e){const pt=posOf(e);if(!pt)return;ctx.fillStyle=css('--sprite');ctx.beginPath();ctx.arc(wx(pt.x),wy(pt.y),2.5,0,7);ctx.fill();}
function drawTerrain(e){if(e.Type==='EditorPhysicsEntity')return drawMarker(e);const poly=outline(e);if(!poly)return;
  const path=()=>{ctx.beginPath();poly.forEach((p,i)=>i?ctx.lineTo(wx(p.x),wy(p.y)):ctx.moveTo(wx(p.x),wy(p.y)));ctx.closePath();};
  const filled=fillTerrain(e,poly);          // tiled ground texture (if it has one)
  path();
  if(!filled){ctx.fillStyle=css('--terrain')+'22';ctx.fill();}
  ctx.lineWidth=filled?1:1.4; ctx.strokeStyle=css('--terrain')+(filled?'66':'');ctx.stroke();}
function fillTerrain(e,poly){
  const P=e.Properties||{},fn=P.textureFill,img=fn&&FILLTEX[fn];
  if(!img||!img.complete||!img.naturalWidth) return false;
  ctx.save();
  ctx.beginPath();poly.forEach((p,i)=>i?ctx.lineTo(wx(p.x),wy(p.y)):ctx.moveTo(wx(p.x),wy(p.y)));ctx.closePath();ctx.clip();
  const pat=ctx.createPattern(img,'repeat');
  const sps=view.scale/SPRITE_CS*(P.fillTile||1);     // screen px per texel
  const m=new DOMMatrix();m.translateSelf(wx(0),wy(0));m.rotateSelf(P.textureRot||0);m.scaleSelf(sps,sps);
  try{pat.setTransform(m);}catch(_){}
  ctx.fillStyle=pat;
  let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;poly.forEach(p=>{const X=wx(p.x),Y=wy(p.y);mnx=Math.min(mnx,X);mny=Math.min(mny,Y);mxx=Math.max(mxx,X);mxy=Math.max(mxy,Y);});

function drawTrigger(e){const pt=posOf(e);if(!pt)return;const sx=wx(pt.x),sy=wy(pt.y),r=(e.Properties||{}).radius||0;
  ctx.strokeStyle=css('--trigger');ctx.lineWidth=1.3;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(sx,sy,Math.max(4,r*view.scale),0,7);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=css('--trigger');ctx.beginPath();ctx.arc(sx,sy,2,0,7);ctx.fill();}
function drawJoint(e){const a=e.Anchors||[];if(!a.length)return;ctx.strokeStyle=css('--joint');ctx.lineWidth=1.3;
  if(a.length>=2){ctx.beginPath();ctx.moveTo(wx(a[0].x),wy(a[0].y));ctx.lineTo(wx(a[1].x),wy(a[1].y));ctx.stroke();}
  a.forEach(an=>{const sx=wx(an.x),sy=wy(an.y);ctx.beginPath();ctx.moveTo(sx-3,sy-3);ctx.lineTo(sx+3,sy+3);ctx.moveTo(sx+3,sy-3);ctx.lineTo(sx-3,sy+3);ctx.stroke();});}
function drawMarker(e){const pt=posOf(e);if(!pt)return;const sx=wx(pt.x),sy=wy(pt.y);
  let g='◆',label='';if(e.Type==='Moto'){g='🏍';label='START';}else if(e.Type==='TriggerWin'){g='🏁';label='WIN';}
  else if(e.Type==='EditorCamera'){g='🎥';}else if(e.Type==='ExplosiveBarrel'){g='💥';}else if(e.Type==='EditorPhysicsEntity'){g='▣';}
  ctx.font='15px '+css('--font-ui');ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(g,sx,sy);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

function drawGizmo(e){const pt=posOf(e);if(!pt)return;const sx=wx(pt.x),sy=wy(pt.y);const acc=css('--accent');
  const poly=outline(e);
  if(poly&&metaFor(e.Type).group==='Terrain'){ctx.strokeStyle=acc;ctx.lineWidth=2;ctx.beginPath();poly.forEach((p,i)=>i?ctx.lineTo(wx(p.x),wy(p.y)):ctx.moveTo(wx(p.x),wy(p.y)));ctx.closePath();ctx.stroke();
    (e.Vertexes||[]).forEach((v,i)=>{ctx.fillStyle=(i===hoverVtx)?css('--trigger'):acc;ctx.beginPath();ctx.arc(wx(v.x),wy(v.y),4,0,7);ctx.fill();});}
  else{const b=entBounds(e);ctx.strokeStyle=acc;ctx.lineWidth=1.5;ctx.strokeRect(wx(b.mnx)-3,wy(b.mxy)-3,(b.mxx-b.mnx)*view.scale+6,(b.mxy-b.mny)*view.scale+6);}
  // move gizmo (red X / green Y axes) + center
  if(tool==='move'||tool==='select'){const L=46;
    ctx.lineWidth=2;ctx.strokeStyle=css('--axis-x');ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+L,sy);ctx.stroke();
    ctx.fillStyle=css('--axis-x');ctx.beginPath();ctx.moveTo(sx+L,sy-4);ctx.lineTo(sx+L+7,sy);ctx.lineTo(sx+L,sy+4);ctx.fill();
    ctx.strokeStyle=css('--axis-y');ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx,sy-L);ctx.stroke();
    ctx.fillStyle=css('--axis-y');ctx.beginPath();ctx.moveTo(sx-4,sy-L);ctx.lineTo(sx,sy-L-7);ctx.lineTo(sx+4,sy-L);ctx.fill();
    ctx.fillStyle=acc;ctx.fillRect(sx-3,sy-3,6,6);}
  if(tool==='rotate'){ctx.strokeStyle=acc;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,42,0,7);ctx.stroke();}}

// ── interaction ────────────────────────────────────────────────────────────────
let down=false,last=null,moved=0,mode=null,dragVtx=-1,hoverVtx=-1,axis=null,rotStart=0;
function localM(ev){const r=cv.getBoundingClientRect();return{x:ev.clientX-r.left,y:ev.clientY-r.top};}
function vertexAt(e,m){if(!e||!e.Vertexes)return -1;for(let i=0;i<e.Vertexes.length;i++){const v=e.Vertexes[i];const dx=wx(v.x)-m.x,dy=wy(v.y)-m.y;if(dx*dx+dy*dy<=36)return i;}return -1;}
function axisAt(e,m){if(!e)return null;const pt=posOf(e);if(!pt)return null;const sx=wx(pt.x),sy=wy(pt.y),L=46;
  if(m.x>=sx+4&&m.x<=sx+L+8&&Math.abs(m.y-sy)<=5)return 'x';
  if(m.y<=sy-4&&m.y>=sy-L-8&&Math.abs(m.x-sx)<=5)return 'y';
  if(Math.abs(m.x-sx)<=5&&Math.abs(m.y-sy)<=5)return 'free'; return null;}
function pick(m){let best=null,bd=14*14;ENTS.forEach(ent=>{if(hidden.has(ent._id))return;const pt=posOf(ent);if(!pt)return;const dx=wx(pt.x)-m.x,dy=wy(pt.y)-m.y,d=dx*dx+dy*dy;if(d<bd){bd=d;best=ent;}});
  if(!best){for(const ent of ENTS){if(hidden.has(ent._id)||metaFor(ent.Type).group!=='Terrain')continue;const poly=outline(ent);if(poly&&pointIn(poly,m)){best=ent;break;}}}return best;}
function pointIn(poly,m){let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=wx(poly[i].x),yi=wy(poly[i].y),xj=wx(poly[j].x),yj=wy(poly[j].y);if(((yi>m.y)!==(yj>m.y))&&(m.x<(xj-xi)*(m.y-yi)/(yj-yi)+xi))inside=!inside;}return inside;}
let spaceDown=false;
window.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.code==='Space'){spaceDown=true;e.preventDefault();}
  else if(e.key==='q')setTool('select');else if(e.key==='w')setTool('move');else if(e.key==='e')setTool('rotate');
  else if(e.key==='f')frameSel();else if(e.key==='a')frameAll();
  else if((e.key==='Delete'||e.key==='Backspace')&&selected)delEntity();});
window.addEventListener('keyup',e=>{if(e.code==='Space')spaceDown=false;});
cv.addEventListener('mousedown',ev=>{down=true;moved=0;last={x:ev.clientX,y:ev.clientY};const m=localM(ev);
  if(spaceDown||tool==='pan'){mode='pan';return;}
  dragVtx=vertexAt(selected,m); if(dragVtx>=0){mode='vertex';return;}
  if(selected&&(tool==='move'||tool==='select')){const a=axisAt(selected,m);if(a){mode='move';axis=a;return;}}
  if(selected&&tool==='rotate'){const pt=posOf(selected);rotStart=Math.atan2(m.y-wy(pt.y),m.x-wx(pt.x));mode='rotate';return;}
  const hit=pick(m);
  if(hit){selectEnt(hit,false);mode=(tool==='move'||tool==='rotate')?tool:'select';axis='free';
    if(tool==='rotate'){const pt=posOf(hit);rotStart=Math.atan2(m.y-wy(pt.y),m.x-wx(pt.x));}}
  else{mode='pan';}});
window.addEventListener('mouseup',()=>{if(down&&mode==='pan'&&moved<4&&tool!=='pan'&&!spaceDown){selectEnt(null);}if((mode==='vertex'||mode==='move'||mode==='rotate')&&moved>3)markDirty();down=false;mode=null;dragVtx=-1;axis=null;});
window.addEventListener('mousemove',ev=>{const m=localM(ev),w=s2w(m.x,m.y);
  $('#sCur').textContent=`${w.x.toFixed(0)}, ${w.y.toFixed(0)}`;$('#hud').textContent=`${w.x.toFixed(0)}, ${w.y.toFixed(0)}`;
  if(!down){const hv=vertexAt(selected,m);if(hv!==hoverVtx){hoverVtx=hv;draw();}return;}
  const dx=ev.clientX-last.x,dy=ev.clientY-last.y;moved+=Math.abs(dx)+Math.abs(dy);let dwx=dx/view.scale,dwy=-dy/view.scale;
  if(mode==='pan'){view.x-=dwx;view.y-=dwy;}
  else if(mode==='vertex'&&selected){const v=selected.Vertexes[dragVtx];v.x+=dwx;v.y+=dwy;if(snap){v.x=Math.round(v.x/snapStep)*snapStep;v.y=Math.round(v.y/snapStep)*snapStep;}}
  else if(mode==='move'&&selected){if(axis==='x')dwy=0;if(axis==='y')dwx=0;translate(selected,dwx,dwy);if(selected.Properties&&Array.isArray(selected.Properties.position))refreshInspectorVals();}
  else if(mode==='rotate'&&selected){const pt=posOf(selected);const ang=Math.atan2(m.y-wy(pt.y),m.x-wx(pt.x));let dd=(ang-rotStart)*180/Math.PI;rotStart=ang;const P=selected.Properties||{};P.rotation=((P.rotation||0)+dd);refreshInspectorVals();}
  last={x:ev.clientX,y:ev.clientY};draw();});
cv.addEventListener('wheel',ev=>{ev.preventDefault();const m=localM(ev),before=s2w(m.x,m.y);view.scale*=ev.deltaY<0?1.1:1/1.1;const after=s2w(m.x,m.y);view.x+=before.x-after.x;view.y+=before.y-after.y;updZoom();draw();},{passive:false});

// ── hierarchy ──────────────────────────────────────────────────────────────────
function renderTree(){
  const q=$('#filter').value.trim().toLowerCase();let typeFilter=null;let qq=q;
  const tm=q.match(/^t:(\S+)/);if(tm){typeFilter=tm[1];qq=q.replace(/^t:\S+\s*/,'');}
  const groups={};GROUP_ORDER.forEach(g=>groups[g]=[]);
  ENTS.forEach(e=>{const g=groupOf(e);(groups[g]||(groups[g]=[])).push(e);});
  const tree=$('#tree');tree.innerHTML='';const filtering=!!(qq||typeFilter);
  GROUP_ORDER.forEach(g=>{let items=groups[g]||[];if(!items.length)return;
    let shown=items;if(filtering)shown=items.filter(e=>(!typeFilter||(g.toLowerCase().includes(typeFilter)||e.Type.toLowerCase().includes(typeFilter)))&&(!qq||nameOf(e).toLowerCase().includes(qq)));
    if(filtering&&!shown.length)return;
    const gd=document.createElement('div');gd.className='grp';
    const isOpen=filtering||!collapsed.has(g);
    const gh=document.createElement('div');gh.className='ghead';gh.innerHTML=`<span class="tri">${isOpen?'▼':'▶'}</span><span class="gname">${g}</span><span class="gcount">${shown.length}</span>`;
    gh.onclick=()=>{if(collapsed.has(g))collapsed.delete(g);else collapsed.add(g);renderTree();};
    gd.appendChild(gh);
    if(isOpen)shown.forEach(e=>{const r=document.createElement('div');r.className='row'+(e===selected?' sel':'')+(hidden.has(e._id)?' hidden':'');r.dataset.id=e._id;
      r.innerHTML=`<span class="ico">${metaFor(e.Type).icon}</span><span class="nm">${escapeHtml(nameOf(e))}</span><span class="eye">${hidden.has(e._id)?'🚫':'👁'}</span>`;
      r.onclick=ev=>{if(ev.target.classList.contains('eye')){toggleHide(e);return;}selectEnt(e,true);};
      r.ondblclick=()=>{selectEnt(e,false);frameSel();};
      gd.appendChild(r);});
    tree.appendChild(gd);});
}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toggleHide(e){if(hidden.has(e._id))hidden.delete(e._id);else hidden.add(e._id);renderTree();draw();}
function selectEnt(e,fromTree){selected=e;renderInspector();updSel();
  if(!fromTree)syncTreeSelection(); else renderTree(); draw();}
function syncTreeSelection(){document.querySelectorAll('.row.sel').forEach(r=>r.classList.remove('sel'));
  if(selected){const r=document.querySelector(`.row[data-id="${selected._id}"]`);if(r){r.classList.add('sel');r.scrollIntoView({block:'nearest'});}else{ // group collapsed → open it
    collapsed.delete(groupOf(selected));renderTree();const r2=document.querySelector(`.row[data-id="${selected._id}"]`);if(r2)r2.scrollIntoView({block:'nearest'});}}}

// ── inspector ──────────────────────────────────────────────────────────────────
function renderInspector(){const ins=$('#insp');if(!selected){ins.innerHTML='<div class="insp-empty">No selection</div>';return;}
  const e=selected,P=e.Properties||{};let h='';
  // Transform
  const tf=[];
  if(Array.isArray(P.position))tf.push(vecField('position','Position',P.position));
  if('rotation'in P)tf.push(numField('rotation','Rotation','°'));
  if('scale'in P)tf.push(numField('scale','Scale'));
  h+=fold('Transform',tf.join('')||'<div class="f"><label>—</label><span class="ro">no transform</span></div>');
  // Identity
  h+=fold('Identity',`<div class="f"><label>type</label><span class="ctl"><span class="typechip">${e.Type}</span></span></div>`+
    ('name'in P?txtField('name','name'):'')+`<div class="f"><label>id</label><span class="ro">${e._id}${e.Vertexes?' · '+e.Vertexes.length+' pts'+(P.spline?' (spline)':''):''}</span></div>`);
  // Appearance (sprites)
  if('frame'in P){let th='';const fm=FRAMES[P.frame];if(fm)th=`<div class="thumb" style="background-image:url('/api/atlas/${fm.atlas}')" title="${P.frame}"></div>`;
    h+=fold('Appearance',th+selField('frame','frame',Object.keys(FRAMES))+('opacity'in P?rangeField('opacity','opacity',0,1):''));}
  // Physics
  const phys=['density','friction','restitution'].filter(k=>k in P);
  if(phys.length)h+=fold('Physics',phys.map(k=>(k==='density'||k==='friction'||k==='restitution')?rangeField(k,k,0,(k==='density'?5:1)):numField(k,k)).join(''));
  // everything else
  const shown=new Set(['position','rotation','scale','name','frame','opacity','density','friction','restitution']);
  const rest=Object.keys(P).filter(k=>!shown.has(k)).sort();
  if(rest.length)h+=fold('Type-specific',rest.map(k=>autoField(k,P[k])).join(''));
  h+=`<div class="delrow"><button onclick="delEntity()">Delete entity</button></div>`;
  ins.innerHTML=h;
  ins.querySelectorAll('.fold>.fhead').forEach(fh=>fh.onclick=()=>{const n=fh.dataset.fold;foldOpen[n]=!foldOpen[n];renderInspector();});
  bindScrub();
}
function fold(name,inner){const open=foldOpen[name]!==false;return `<div class="fold"><div class="fhead" data-fold="${name}"><span class="tri">${open?'▼':'▶'}</span>${name}</div>${open?`<div class="fbody">${inner}</div>`:''}</div>`;}
function autoField(k,v){if(typeof v==='boolean')return boolField(k,k);if(typeof v==='number')return numField(k,k);if(typeof v==='string')return txtField(k,k);
  if(Array.isArray(v)&&v.every(x=>typeof x==='number'))return arrField(k,k,v);return `<div class="f"><label title="${k}">${k}</label><span class="ro">${escapeHtml(JSON.stringify(v))}</span></div>`;}
function numField(k,lbl,suf){const v=selected.Properties[k];return `<div class="f"><label class="scrub" data-k="${k}">${lbl}</label><span class="ctl"><input type="number" step="any" value="${fmtNum(v)}" oninput="setNum('${k}',this.value)">${suf?`<span class="axis">${suf}</span>`:''}</span></div>`;}
function txtField(k,lbl){return `<div class="f"><label>${lbl}</label><span class="ctl"><input type="text" value="${escapeHtml(selected.Properties[k])}" oninput="setVal('${k}',this.value)"></span></div>`;}
function boolField(k,lbl){return `<div class="f"><label>${lbl}</label><span class="ctl"><input type="checkbox" ${selected.Properties[k]?'checked':''} onchange="setVal('${k}',this.checked)"></span></div>`;}
function rangeField(k,lbl,mn,mx){const v=selected.Properties[k];return `<div class="f"><label class="scrub" data-k="${k}">${lbl}</label><span class="ctl"><input type="range" min="${mn}" max="${mx}" step="${(mx-mn)/200}" value="${v}" oninput="setNum('${k}',this.value);this.nextElementSibling.textContent=(+this.value).toFixed(2)"><span class="rv">${(+v).toFixed(2)}</span></span></div>`;}
function vecField(k,lbl,arr){return `<div class="f"><label>${lbl}</label><span class="ctl"><span class="axis x">X</span><input type="number" step="any" value="${fmtNum(arr[0])}" oninput="setVec('${k}',0,this.value)"><span class="axis y">Y</span><input type="number" step="any" value="${fmtNum(arr[1])}" oninput="setVec('${k}',1,this.value)"></span></div>`;}
function arrField(k,lbl,arr){return `<div class="f"><label title="${k}">${lbl}</label><span class="ctl"><input type="text" value="${arr.map(fmtNum).join(', ')}" oninput="setArr('${k}',this.value)"></span></div>`;}
function selField(k,lbl,opts){const cur=selected.Properties[k];const o=opts.slice(0,400).map(f=>`<option ${f===cur?'selected':''}>${escapeHtml(f)}</option>`).join('');return `<div class="f"><label>${lbl}</label><span class="ctl"><select onchange="setVal('${k}',this.value);renderInspector()">${o}</select></span></div>`;}
function fmtNum(v){return (Math.round((+v)*1000)/1000);}
function setVal(k,v){selected.Properties[k]=v;markDirty();draw();}
function setNum(k,v){const n=parseFloat(v);if(!isNaN(n)){selected.Properties[k]=n;markDirty();draw();}}
function setVec(k,i,v){const n=parseFloat(v);if(!isNaN(n)){selected.Properties[k][i]=n;markDirty();draw();}}
function setArr(k,s){const a=s.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));if(a.length){selected.Properties[k]=a;markDirty();draw();}}
function refreshInspectorVals(){ // light refresh of position/rotation fields during drag
  const ins=$('#insp');const P=selected.Properties||{};
  ins.querySelectorAll('.f').forEach(()=>{});renderInspector();}
let scrubbing=null;
function bindScrub(){document.querySelectorAll('.f label.scrub').forEach(l=>{l.onmousedown=ev=>{ev.preventDefault();const k=l.dataset.k;const start=+selected.Properties[k]||0;const mag=Math.max(Math.abs(start),1);const step=mag>100?1:mag>10?0.1:0.01;scrubbing={k,start,sx:ev.clientX,step};};});}
window.addEventListener('mousemove',ev=>{if(!scrubbing)return;const dx=ev.clientX-scrubbing.sx;const mult=ev.shiftKey?10:1;selected.Properties[scrubbing.k]=+(scrubbing.start+dx*scrubbing.step*mult).toFixed(4);markDirty();renderInspector();draw();});

// ── atlas loading ──────────────────────────────────────────────────────────────
async function loadAtlas(lid){FRAMES={};ATLAS={};FILLTEX={};
  const r=await fetch('/api/atlasmeta/'+encodeURIComponent(lid));const d=await r.json();FRAMES=d.frames||{};
  (d.atlases||[]).forEach(name=>{const img=new Image();img.onload=()=>draw();img.src='/api/atlas/'+name;ATLAS[name]=img;});
  // terrain fill (ground) textures — opaque, tiled into the polygons
  const fills=new Set();ENTS.forEach(e=>{const f=(e.Properties||{}).textureFill;if(f)fills.add(f);});
  fills.forEach(n=>{const img=new Image();img.onload=()=>draw();img.src='/api/fill/'+encodeURIComponent(n);FILLTEX[n]=img;});}

// ── load / save / export ────────────────────────────────────────────────────────
async function loadLevel(lid){LID=lid;const r=await fetch('/api/level/'+encodeURIComponent(lid));LEVEL=await r.json();
  ENTS=LEVEL.Entities||[];ENTS.forEach((e,i)=>e._id=i);selected=null;dirty=false;hidden=new Set();hoverVtx=-1;
  collapsed=new Set(BIG_GROUPS);$('#saveBtn').disabled=true;
  $('#key').placeholder=KEYS[lid]?'key on file ✓':'level key (hex)';
  await loadAtlas(lid);
  renderInspector();renderTree();updCount();updSel();
  requestAnimationFrame(()=>{resize();frameAll();updZoom();draw();});  // fit once layout settles
  setStat(KEYS[lid]?'ready · key on file':'ready');}
async function save(){LEVEL.Entities=ENTS.map(({_id,...e})=>e);setStat('saving…','busy');
  const r=await fetch('/api/level/'+encodeURIComponent(LID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(LEVEL)});
  const d=await r.json();ENTS.forEach((e,i)=>e._id=i);
  if(d.ok){dirty=false;$('#saveBtn').disabled=true;setStat('✓ saved ('+d.entities+')','ok');}else setStat('✗ '+d.error,'err');return d.ok;}
async function exportDat(){if(dirty){if(!await save())return;}const key=$('#key').value.trim();
  if(!key&&!KEYS[LID]){setStat('✗ enter the level key','err');$('#key').focus();return;}
  setStat('encrypting… (~1 min)','busy');$('#exportBtn').disabled=true;
  try{const r=await fetch('/api/export/'+encodeURIComponent(LID),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,remember:true})});
    const d=await r.json();if(d.ok){setStat('✓ wrote '+d.path.split('/').pop()+' ('+d.bytes+' B)','ok');KEYS[LID]=true;}else setStat('✗ '+d.error,'err');}
  catch(e){setStat('✗ '+e,'err');}$('#exportBtn').disabled=false;}

async function init(){
  const th=localStorage.getItem(LS('theme'));if(th)document.documentElement.dataset.theme=th;
  ['--left-w','--right-w'].forEach(v=>{const s=localStorage.getItem(LS(v));if(s)document.documentElement.style.setProperty(v,s+'px');});
  setTool('select');$('#bGrid').classList.add('on');$('#bArt').classList.add('on');
  initSplitter($('#lsplit'),'--left-w',true);initSplitter($('#rsplit'),'--right-w',false);
  KEYS=((await (await fetch('/api/keys')).json()).have)||{};
  const d=await (await fetch('/api/levels')).json();const sel=$('#lvlSel');sel.innerHTML='';
  (d.levels||[]).forEach(l=>{const o=document.createElement('option');o.value=o.textContent=l;sel.appendChild(o);});
  sel.onchange=()=>{if(dirty&&!confirm('Discard unsaved changes?')){sel.value=LID;return;}loadLevel(sel.value);};
  if(d.levels&&d.levels.length)loadLevel(d.levels[0]);else{$('#tree').innerHTML='<div class="insp-empty">No cached levels.</div>';}
}
init();
</script>
</body>
</html>
